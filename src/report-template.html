<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDR Analysis Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .toolbar h1 { font-size: 16px; font-weight: 600; color: #e94560; margin-right: auto; }
    button {
      padding: 8px 16px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      background: #0f3460; color: #e0e0e0; border: 1px solid #1a4a7a;
      transition: background 0.2s;
    }
    button:hover { background: #1a4a7a; }
    .content {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 20px; overflow: auto;
    }
    .chart-canvas {
      max-width: 100%; height: auto;
      background: #fff; border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
    .status-bar {
      padding: 6px 20px; background: #0f3460;
      font-size: 11px; color: #888; border-top: 1px solid #16213e;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>HDR Analysis Report</h1>
    <button id="btn-save">下载 PNG</button>
  </div>
  <div class="content">
    <canvas id="chart-canvas" class="chart-canvas"></canvas>
  </div>
  <div class="status-bar" id="status-bar">__FILENAME__</div>

  <script>
__CHART_RENDERER__
  </script>
  <script>
    const analysisData = __ANALYSIS_DATA__;
    const canvas = document.getElementById('chart-canvas');
    window.drawChart(canvas, analysisData);

    document.getElementById('btn-save').addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = (analysisData.filename || 'hdr-analysis').replace(/\.[^.]+$/, '') + '-hdr.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  </script>
</body>
</html>
