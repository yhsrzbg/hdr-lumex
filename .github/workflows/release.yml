name: Build and Release

on:
  push:
    tags:
      - 'v*'
  # Manual runs produce build artifacts but NOT a release, because the
  # release job requires a tag ref (startsWith(github.ref, 'refs/tags/')).
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build single-file executable
        run: npm run build

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd dist
          7z a "HDR-Video-Analyzer-windows.zip" "HDR-Video-Analyzer.exe"

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cp launchers/run-mac.command dist/
          chmod +x dist/HDR-Video-Analyzer dist/run-mac.command
          cd dist
          zip -j "HDR-Video-Analyzer-macos.zip" "HDR-Video-Analyzer" "run-mac.command"

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp launchers/run-linux.sh dist/
          chmod +x dist/HDR-Video-Analyzer dist/run-linux.sh
          cd dist
          zip -j "HDR-Video-Analyzer-linux.zip" "HDR-Video-Analyzer" "run-linux.sh"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: dist/*.zip

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
