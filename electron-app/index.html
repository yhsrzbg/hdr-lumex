<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline';">
  <title>HDR Video Analyzer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    .toolbar h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
      margin-right: auto;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #e94560;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #d63851;
    }

    .btn-secondary {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a4a7a;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #1a4a7a;
    }

    .progress-container {
      padding: 0 20px;
      background: #16213e;
      overflow: hidden;
      transition: max-height 0.3s, padding 0.3s;
      max-height: 0;
      flex-shrink: 0;
    }

    .progress-container.visible {
      max-height: 80px;
      padding: 10px 20px;
    }

    .progress-bar-wrapper {
      width: 100%;
      height: 6px;
      background: #0f3460;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f5a623);
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: auto;
    }

    .placeholder {
      text-align: center;
      color: #555;
    }

    .placeholder p {
      font-size: 14px;
      margin-top: 8px;
    }

    .placeholder .icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .chart-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .status-bar {
      padding: 6px 20px;
      background: #0f3460;
      font-size: 11px;
      color: #888;
      border-top: 1px solid #16213e;
      flex-shrink: 0;
    }

    .error-message {
      color: #e94560;
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 13px;
      max-width: 500px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>HDR Video Analyzer</h1>
    <button id="btn-select" class="btn-primary">Select Video</button>
    <button id="btn-save" class="btn-secondary" disabled>Save As</button>
  </div>

  <div class="progress-container" id="progress-container">
    <div class="progress-bar-wrapper">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text">Preparing...</div>
  </div>

  <div class="content" id="content">
    <div class="placeholder" id="placeholder">
      <div class="icon">&#127916;</div>
      <p>Select an HDR video file to begin analysis</p>
      <p style="font-size: 12px; margin-top: 4px; color: #444;">Supported formats: MKV, MP4, MOV, TS</p>
    </div>
  </div>

  <div class="status-bar" id="status-bar">Ready</div>

  <script src="renderer.js"></script>
</body>
</html>
